{% extends "base.html" %}
{% block content %}
<div class="container">
  <h3 class="text-light">Prediction History</h3>
  <div class="table-responsive">
    <table class="table table-dark table-striped">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Filename</th>
          <th>Prediction</th>
          <th>Confidence</th>
        </tr>
      </thead>
      <tbody>
        {% for h in history %}
        <tr>
          <td>{{ h.timestamp }}</td>
          <td><img src="{{ url_for('serve_upload_file', filename=h.filename) }}" width="60" class="me-2 rounded"> {{ h.filename }}</td>
          <td>{{ h.prediction }}</td>
          <td>{{ h.confidence }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
