{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
  <div class="row">
    <!-- Left side: Grid + Buttons -->
    <div class="col-lg-3">
      <!-- Predictions Grid Card -->
      <div class="card mb-3">
        <div class="card-body p-2">
          <h6 class="mb-2">Sample Predictions</h6>
          <div id="gridWrapper" class="text-center">
            {% if pred_grid %}
              <img id="predGridImg" src="{{ url_for('serve_result_file', filename='predictions_grid.png') }}?t={{ range(0,10000)|random }}" class="img-fluid rounded border" alt="pred grid" style="max-width: 100%; height: auto; max-height: 300px;">
            {% else %}
              <p class="text-muted small">No predictions grid available.</p>
            {% endif %}
          </div>
        </div>
      </div>

      <!-- Sample Selection Buttons -->
      <div class="card">
        <div class="card-body p-2">
          <small class="d-block mb-2" style="color: #a1a8af;">Click a sample:</small>
          <div id="gridCellsList" class="d-flex flex-wrap gap-1"></div>
        </div>
      </div>
    </div>

    <!-- Right side: Chat + Selected Sample -->
    <div class="col-lg-9">
      <!-- Chat Card -->
      <div class="card mb-3">
        <div class="card-header">
          <h5 class="mb-0">
            <i class="bi bi-chat-left-dots"></i> Chat with Astra — AI Assistant
          </h5>
        </div>
        <div class="card-body" style="display: flex; flex-direction: column; height: 400px;">
          <div id="chatBox" style="flex: 1; overflow-y: auto; background: #0d1117; padding: 15px; border-radius: 6px; color: #e6edf3; margin-bottom: 10px; border: 1px solid #1e293b;"></div>
          <div class="input-group">
            <input id="chatInput" type="text" class="form-control" placeholder="Ask me anything...">
            <button id="chatSend" class="btn btn-primary">
              <i class="bi bi-send"></i> Send
            </button>
          </div>
        </div>
      </div>

      <!-- Selected Sample Info -->
      <div class="card">
        <div class="card-header">
          <h6 class="mb-0"><i class="bi bi-image"></i> Selected Sample</h6>
        </div>
        <div class="card-body">
          <div id="selectedSample" class="small" style="color: #e6edf3;">No sample selected.</div>
          <div id="selectedDetails" class="mt-2 small" style="color: #d1fae5;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  #chatBox {
    word-break: break-word;
    white-space: pre-wrap;
  }

  .chat-message {
    margin-bottom: 12px;
    padding: 10px;
    border-radius: 4px;
  }

  .chat-user {
    background: #1e40af;
    color: white;
    margin-left: 20px;
  }

  .chat-assistant {
    background: #0f766e;
    color: #d1fae5;
    margin-right: 20px;
  }

  .chat-assistant strong {
    color: #5eead4;
  }

  .sample-btn {
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
  }

  .sample-btn.active {
    background-color: #10b981;
    border-color: #10b981;
  }
</style>

<script src="{{ url_for('static', filename='js/ai_chat.js') }}"></script>
{% endblock %}
