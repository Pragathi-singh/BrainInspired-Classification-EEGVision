<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EEGVision Dashboard</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Custom Dashboard CSS -->
  <style>
    body {
      background-color: #0b0f1a;
      color: #e4e7ec;
      font-family: "Segoe UI", sans-serif;
    }

    #wrapper {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    #sidebar-wrapper {
      width: 250px;
      background: linear-gradient(180deg, #0d1117 0%, #111827 100%);
      color: white;
      transition: all 0.3s ease;
    }

    .sidebar-heading {
      font-size: 1.4rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      font-weight: bold;
    }

    .accent {
      color: #00b4d8;
    }

    .list-group-item {
      background: transparent;
      color: #cfd3dc;
      border: none;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .list-group-item:hover,
    .list-group-item.active {
      background-color: #00b4d8;
      color: white;
      border-radius: 0;
    }

    /* Navbar */
    .navbar-dark {
      background-color: #0d1117 !important;
      border-bottom: 1px solid #222;
    }

    .btn-outline-light {
      border-color: #00b4d8;
      color: #00b4d8;
    }

    .btn-outline-light:hover {
      background-color: #00b4d8;
      color: #fff;
    }

    /* Cards */
    .card {
      background-color: #111827;
      border: 1px solid #1e293b;
      box-shadow: 0 0 10px rgba(0, 180, 216, 0.1);
      border-radius: 12px;
      color: #e4e7ec;
    }

    /* Sidebar toggle animation */
    #sidebar-wrapper.collapsed {
      margin-left: -250px;
    }

    /* Accent glowing text */
    .glow {
      color: #00b4d8;
      text-shadow: 0 0 10px #00b4d8, 0 0 20px #00b4d8;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="border-end" id="sidebar-wrapper">
      <div class="sidebar-heading text-white px-3 py-4">
        <i class="bi bi-cpu-fill glow"></i> EEG<span class="accent">Vision</span>
      </div>
      <div class="list-group list-group-flush">
        <a href="{{ url_for('dashboard') }}" class="list-group-item list-group-item-action">
          <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>
        <a href="{{ url_for('upload_page') }}" class="list-group-item list-group-item-action">
          <i class="bi bi-cloud-upload me-2"></i> Upload Image
        </a>
        <a href="{{ url_for('history_page') }}" class="list-group-item list-group-item-action">
          <i class="bi bi-clock-history me-2"></i> History
        </a>
        <a href="{{ url_for('ai_chat_page') }}" class="list-group-item list-group-item-action">
          <i class="bi bi-chat-left-dots me-2"></i> AI Chat
        </a>
        <a href="{{ url_for('about') }}" class="list-group-item list-group-item-action">
          <i class="bi bi-info-circle me-2"></i> About
        </a>
      </div>
    </div>
    <!-- /#sidebar-wrapper -->

    <!-- Page Content -->
    <div id="page-content-wrapper" class="w-100">
      <nav class="navbar navbar-expand-lg navbar-dark border-bottom px-3">
        <div class="container-fluid">
          <button class="btn btn-dark" id="sidebarToggle"><i class="bi bi-list"></i></button>
          <h5 class="ms-3 mb-0 text-light fw-semibold glow">EEGVision Research Dashboard</h5>
          <div class="ms-auto">
            <button class="btn btn-outline-light me-2" id="trainBtn">
              <i class="bi bi-play-circle"></i> Start Training
            </button>
            <a href="{{ url_for('download_report') }}" class="btn btn-outline-light">
              <i class="bi bi-file-earmark-arrow-down"></i> Report
            </a>
          </div>
        </div>
      </nav>

      <div class="container-fluid p-4">
        {% block content %}{% endblock %}
      </div>

      <div class="footer py-3">
        <p>© 2025 EEGVision | Brain-Inspired Image Classification | Team I-15—Computer Engineering</p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  <script>
    // Sidebar toggle
    document.getElementById("sidebarToggle").addEventListener("click", () => {
      document.getElementById("sidebar-wrapper").classList.toggle("collapsed");
    });

    // Start training button
    document.getElementById("trainBtn").addEventListener("click", async () => {
      try {
        const res = await fetch("/train", { method: "POST" });
        const data = await res.json();
        if (data.ok) {
          alert("Training started in background. Please wait...");
        } else {
          alert(data.msg || "Training already running.");
        }
      } catch (err) {
        alert("Error: " + err);
      }
    });
  </script>
</body>
</html>
