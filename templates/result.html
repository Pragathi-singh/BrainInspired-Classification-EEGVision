<!-- templates/result.html -->
{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h4 class="text-light">Prediction Result</h4>
    <div class="row">
      <div class="col-md-5">
        <img src="{{ url_for('uploads', filename=img_url.split('/')[-1]) }}" class="img-fluid rounded" alt="uploaded">
      </div>
      <div class="col-md-7">
        <h3 class="mt-2 text-light">{{ top[0]['class'] }}</h3>
        <p class="text-muted">Confidence: {{ top[0]['prob'] }}%</p>

        <canvas id="confChart" width="400" height="200"></canvas>
        <div class="mt-3">
          <a href="{{ url_for('upload_page') }}" class="btn btn-outline-light">Predict Another</a>
          <a href="{{ url_for('home') }}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const top = {{ top|tojson }};
const labels = top.map(i => i.class);
const data = top.map(i => i.prob);
const ctx = document.getElementById('confChart').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{ label:'Confidence (%)', data: data, backgroundColor:['#6c5ce7','#00cec9','#ffeaa7'] }]
  },
  options: { scales:{ y:{ beginAtZero:true, max:100 } } }
});
</script>
{% endblock %}
